name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]

  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 1 # We only need the latest files
          lfs: true

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Delete the tangled Git history so Hugging Face doesn't see it
          rm -rf .git
          
          git init
          git branch -m main
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Tell this clean repo to use LFS for your images
          git lfs install
          git lfs track "*.png"
          git lfs track "*.jpg"
          git add .gitattributes
          
          # Copy requirements to the root for Hugging Face s
          cp engine/requirements.txt ./requirements.txt
          
          # Commit exactly what the files look like right now
          git add .
          git commit -m "Clean auto-deploy to Hugging Face"
          
          # Force-push this perfect 1-commit history to Hugging Face
          git push --force https://balor78:$HF_TOKEN@huggingface.co/spaces/balor78/imprimer main
syntax = "proto3";

package imprimer;

option go_package = "github.com/BalorLC3/Imprimer/gateway/gen";

service PromptEngine { // Go calls into Python for this service
    rpc EvaluatePrompt  (EvaluateRequest) returns (EvaluateResponse);
    rpc BestVariant     (BestRequest)     returns (BestResponse);
    rpc OptimizePrompt  (OptimizeRequest) returns (OptimizeResponse);
};

// From Go -> Python
message EvaluateRequest{
    string trace_id   = 1; // UUID generated by Go
    string task       = 2; // e.g. "summarize", "classify", "extract"
    string input      = 3; // actual quest
    string variant_a  = 4; // 1st prompt template to test
    string variant_b  = 5; // 2nd prompt template to test
    string backend    = 6;
    bool   use_judge  = 7;
}

// Python -> Go
message EvaluateResponse{
    string trace_id     = 1; // Same UUID
    string winner       = 2; // "a" or "b"
    string output_a     = 3; // LLM response for A
    string output_b     = 4; // "" for B
    float  latency_a    = 5; // How long variant A took
    float  latency_b    = 6; // "" variant B took
    float  score_a      = 7; // quality score for A
    float  score_b      = 8; // "" for B
}

// This RPC will make the system learn the best prompt
message BestRequest {
  string task  = 1;
  int32  limit = 2;
}

message BestResponse {
  string task             = 1;
  string best_template    = 2; // the prompt template that performed best for this task
  float  avg_reachability = 3;
  float  avg_score        = 4;
  int32  evaluations      = 5;
  bool   found            = 6;
}

// New RPC for optimize, it optimizes reachability for the LLM
message OptimizeRequest {
  string task            = 1;
  string base_prompt     = 2;
  string input_example   = 3;
  string expected_output = 4;
  int32  n_trials        = 5;
  string backend         = 6;
  bool   use_judge       = 7;    // optional flag to use a judge model for evaluation
  float target_reachability = 8; // stop when reachability >= this
  int32 max_iterations   = 9;    // max graph cycles, default 3
}

message OptimizeResponse {
  string best_prompt          = 1;
  float  best_score           = 2;
  float  best_reachability    = 3;
  float  baseline_score       = 4;
  float  baseline_reachability = 5;
  float  improvement          = 6; // gap
  int32  trials_run           = 7; // how many trials we actually ran
  int32  iterations_completed  = 8; // how many graph cycles ran
  bool   target_reached       = 9; // did we hit reachability target?
}